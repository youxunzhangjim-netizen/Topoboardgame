<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="0; url=./world.html" />
  <link rel="canonical" href="./world.html" />
  <title>Life World - Topoboardgame</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #08101a;
      color: #edf4f6;
    }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 20% 0%, rgba(34, 197, 94, 0.16), transparent 34%),
        radial-gradient(circle at 85% 18%, rgba(56, 189, 248, 0.14), transparent 36%),
        linear-gradient(135deg, #08101a, #0d1420 62%, #060b13);
    }
    main {
      width: min(620px, 100%);
      padding: 24px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 14px;
      background: rgba(13, 20, 29, 0.86);
      box-shadow: 0 20px 55px rgba(0, 0, 0, 0.28);
    }
    p {
      margin: 0 0 16px;
      color: rgba(226, 236, 238, 0.84);
      line-height: 1.5;
    }
    a {
      display: inline-flex;
      min-height: 40px;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      border: 1px solid rgba(56, 189, 248, 0.42);
      border-radius: 999px;
      background: rgba(9, 16, 25, 0.72);
      color: #edf4f6;
      font-weight: 900;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <p>Opening the current Life World interface.</p>
    <p lang="zh-Hant">&#27491;&#22312;&#38283;&#21855;&#30446;&#21069;&#30340;&#29983;&#21629;&#19990;&#30028;&#30028;&#38754;&#12290;</p>
    <a id="lifeWorldLink" href="./world.html">Open Life World</a>
  </main>
  <script>
    (() => {
      const target = new URL('./world.html', window.location.href);
      const incoming = new URLSearchParams(window.location.search);
      for (const [key, value] of incoming) target.searchParams.set(key, value);
      if (!target.searchParams.has('lang')) {
        try {
          const stored = localStorage.getItem('topological-boardgame:language');
          if (stored) target.searchParams.set('lang', String(stored).toLowerCase().startsWith('zh') ? 'zh' : 'en');
        } catch {
          // Ignore blocked storage; Life World will choose a language.
        }
      }
      target.hash = window.location.hash;
      const link = document.getElementById('lifeWorldLink');
      if (link) link.href = target.pathname + target.search + target.hash;
      window.location.replace(target.href);
    })();
  </script>
</body>
</html>
